<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAML Test Report - Overview</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 0;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5em;
            font-weight: 300;
        }
        .header .subtitle {
            margin: 10px 0 20px 0;
            font-size: 1.2em;
            opacity: 0.9;
        }
        .header .meta {
            font-size: 1em;
            opacity: 0.8;
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-number {
            font-size: 3em;
            font-weight: bold;
            margin: 10px 0;
            line-height: 1;
        }
        .stat-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-desc {
            color: #888;
            font-size: 0.8em;
            margin-top: 5px;
        }
        .blue { color: #3b82f6; }
        .green { color: #10b981; }
        .red { color: #ef4444; }
        .purple { color: #8b5cf6; }
        .orange { color: #f59e0b; }
        
        .section {
            background: white;
            margin: 20px 0;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .section h2 {
            margin: 0 0 20px 0;
            color: #1f2937;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .config-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .config-table th,
        .config-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        .config-table th {
            background-color: #f9fafb;
            font-weight: 600;
            color: #374151;
        }
        .config-table td:first-child {
            font-weight: 500;
        }
        .success-badge {
            background: #dcfce7;
            color: #166534;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .failure-badge {
            background: #fef2f2;
            color: #dc2626;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .enabled-badge {
            background: #dcfce7;
            color: #166534;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 500;
        }
        .icon { font-size: 1.2em; }
        .loading { text-align: center; padding: 50px; color: #666; }
        .error { color: #ef4444; background: #fef2f2; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            transition: width 0.3s ease;
        }
        .actions {
            text-align: center;
            margin-top: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            margin: 0 10px;
            transition: transform 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <h2>📊 Loading Test Overview...</h2>
        <p>Please wait while we load the test summary...</p>
    </div>

    <div id="report-content" style="display: none;">
        <div class="header">
            <h1>📊 YAML Test Overview</h1>
            <div class="subtitle">Quick Test Results Summary</div>
            <div class="meta" id="header-meta">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
        
        <div class="container">
            <div class="stats-grid" id="stats-grid">
                <!-- Will be populated by JavaScript -->
            </div>

            <div class="section">
                <h2><span class="icon">📈</span> Test Summary</h2>
                <div id="summary-content">
                    <!-- Will be populated by JavaScript -->
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="success-progress"></div>
                </div>
                <div id="summary-text" style="margin-top: 15px; text-align: center; color: #6b7280;">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>

            <div class="section">
                <h2><span class="icon">⚙️</span> Configuration</h2>
                <table class="config-table" id="config-table">
                    <!-- Will be populated by JavaScript -->
                </table>
            </div>

            <div class="actions">
                <a href="#" id="detailed-report-link" class="btn">📋 View Detailed Report</a>
                <a href="#" id="json-data-link" class="btn">📄 View Raw Data</a>
            </div>
        </div>
    </div>

    <div id="error" class="error" style="display: none;">
        <h3>❌ Error Loading Report</h3>
        <p>Failed to load test data. Please check if the JSON file exists and is valid.</p>
    </div>

    <script>
        // Get report ID from URL parameter or use default
        const urlParams = new URLSearchParams(window.location.search);
        const reportId = urlParams.get('report') || 'test-report-2025-06-15-00-05-51';
        const jsonFile = `test-data-${reportId.replace('test-report-', '')}.json`;

        async function loadTestData() {
            try {
                const response = await fetch(jsonFile);
                if (!response.ok) throw new Error('Failed to load test data');
                
                const data = await response.json();
                renderOverview(data);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('report-content').style.display = 'block';
            } catch (error) {
                console.error('Error loading test data:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            }
        }

        function renderOverview(data) {
            // Render header
            const headerMeta = document.getElementById('header-meta');
            headerMeta.innerHTML = `
                Generated: ${new Date(data.metadata.timestamp).toLocaleString()} | 
                Environment: ${data.metadata.environment} | 
                ${data.metadata.tagFilter ? `Tags: ${data.metadata.tagFilter}` : 'All Tests'}
            `;

            // Calculate success rate
            const successRate = (data.summary.passedTestCases / data.summary.totalTestCases) * 100;
            const allPassed = data.summary.failedTestCases === 0;

            // Render stats
            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Cases</div>
                    <div class="stat-number blue">${data.summary.totalTestCases}</div>
                    <div class="stat-desc">Test cases executed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Passed</div>
                    <div class="stat-number green">${data.summary.passedTestCases}</div>
                    <div class="stat-desc">Successful executions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Failed</div>
                    <div class="stat-number red">${data.summary.failedTestCases}</div>
                    <div class="stat-desc">Failed executions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Success Rate</div>
                    <div class="stat-number ${allPassed ? 'green' : data.summary.failedTestCases < data.summary.passedTestCases ? 'orange' : 'red'}">${Math.round(successRate)}%</div>
                    <div class="stat-desc">Overall success rate</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Steps</div>
                    <div class="stat-number purple">${data.summary.totalSteps}</div>
                    <div class="stat-desc">Including step libraries</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Duration</div>
                    <div class="stat-number blue">${data.summary.executionTime || 'N/A'}</div>
                    <div class="stat-desc">Total execution time</div>
                </div>
            `;

            // Render summary
            const summaryContent = document.getElementById('summary-content');
            summaryContent.innerHTML = `
                <div style="background: ${allPassed ? '#dcfce7' : '#fef2f2'}; padding: 20px; border-radius: 8px; border-left: 4px solid ${allPassed ? '#10b981' : '#ef4444'};">
                    <h3 style="color: ${allPassed ? '#166534' : '#dc2626'}; margin: 0 0 10px 0;">
                        ${allPassed ? '✅ All Tests Passed!' : '❌ Some Tests Failed'}
                    </h3>
                    <p style="color: ${allPassed ? '#166534' : '#dc2626'}; margin: 0; font-size: 1.1em;">
                        ${allPassed 
                            ? `All ${data.summary.totalTestCases} test cases executed successfully.`
                            : `${data.summary.failedTestCases} out of ${data.summary.totalTestCases} test cases failed.`
                        }
                    </p>
                </div>
            `;

            // Update progress bar
            const progressBar = document.getElementById('success-progress');
            progressBar.style.width = `${successRate}%`;
            if (!allPassed) {
                progressBar.style.background = successRate > 50 ? 'linear-gradient(90deg, #f59e0b 0%, #d97706 100%)' : 'linear-gradient(90deg, #ef4444 0%, #dc2626 100%)';
            }

            // Update summary text
            const summaryText = document.getElementById('summary-text');
            summaryText.innerHTML = `${data.summary.passedTestCases} passed, ${data.summary.failedTestCases} failed (${Math.round(successRate)}% success rate)`;

            // Render configuration
            const configTable = document.getElementById('config-table');
            configTable.innerHTML = `
                <tr><th>Environment</th><td>${data.metadata.environment} (${data.configuration.configSource})</td></tr>
                <tr><th>Base URL</th><td>${data.configuration.baseUrl}</td></tr>
                ${data.metadata.tagFilter ? `<tr><th>Tag Filter</th><td>${data.metadata.tagFilter}</td></tr>` : ''}
                <tr><th>Report Format</th><td>${data.configuration.reportFormat.toUpperCase()}</td></tr>
                <tr><th>Execution Time</th><td>${data.summary.executionTime}</td></tr>
                <tr><th>Report Generation</th><td><span class="enabled-badge">✓ Enabled</span></td></tr>
            `;

            // Update action links
            const detailedLink = document.getElementById('detailed-report-link');
            detailedLink.href = `template-detailed.html?report=${reportId}`;
            
            const jsonLink = document.getElementById('json-data-link');
            jsonLink.href = jsonFile;
            jsonLink.target = '_blank';
        }

        // Load data when page loads
        window.addEventListener('load', loadTestData);
    </script>
</body>
</html>
